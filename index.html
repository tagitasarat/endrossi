<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Endrossi Intelligence Portfolio</title>
    <style>
        :root {
            --bg: #07090d; --s1: #0d1318; --s2: #111820; --bd: #151e28; --bd2: #1e2c38;
            --tx: #dde6f0; --mt: #4a6070; --dim: #2a3d4e;
            --buy: #22c55e; --hold: #64748b; --trim: #f97316; --ac: #38bdf8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--tx); min-height: 100vh; font-size: 12px; }
        header { padding: 15px 20px; background: var(--s1); border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .actions { display: flex; gap: 8px; padding: 10px 20px; background: var(--s1); border-bottom: 1px solid var(--bd); flex-wrap: wrap; }
        .btn { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-weight: 500; transition: 0.2s; font-size: 11px; }
        .btn-ac { background: var(--ac); color: #000; }
        .btn-dim { background: var(--dim); color: var(--tx); }
        main { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--s1); border: 1px solid var(--bd); border-radius: 12px; padding: 20px; }
        .card-title { font-size: 10px; color: var(--mt); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .stat-val { font-size: 26px; font-weight: 500; color: var(--tx); margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--mt); padding: 10px; border-bottom: 1px solid var(--bd2); font-size: 10px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
        textarea { width: 100%; height: 120px; background: var(--bg); border: 1px solid var(--bd); color: var(--tx); border-radius: 8px; padding: 10px; margin-top: 10px; resize: none; font-size: 11px; }
        .alert-box { background: rgba(249,115,22,0.1); border-left: 3px solid var(--trim); padding: 10px; margin-top: 10px; border-radius: 4px; font-size: 11px; }
        select { background: var(--bg); color: var(--tx); border: 1px solid var(--bd); padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 500; letter-spacing: 0.05em; font-size: 14px;">ENDROSSI <span style="color:var(--ac)">INTELLIGENCE</span></div>
    <div id="api-status" style="font-size:10px; color:var(--hold)">STATUS: CONNECTED</div>
</header>

<div class="actions">
    <button class="btn btn-ac" id="btn-import">IMPORT PORTFOLIO</button>
    <button class="btn btn-dim" id="btn-div">DIVIDEND LOG</button>
    <button class="btn btn-dim" id="btn-refresh">REFRESH SIGNALS</button>
</div>

<main id="dashboard">
    <div class="card">
        <div class="card-title">Net Liquidation Value</div>
        <div id="total-val" class="stat-val">$0.00</div>
        <div id="alerts-container"></div>
    </div>

    <div class="card" style="grid-column: 1 / -1">
        <div class="card-title">Inventory & Technicals</div>
        <table id="asset-table">
            <thead>
                <tr><th>SYMBOL</th><th>VALUE</th><th>PRICE</th><th>RSI</th><th>TIER</th></tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</main>

<div id="modal-import" class="modal">
    <div class="card" style="width: 450px;">
        <div class="card-title">Dime / JSON Import</div>
        <textarea id="import-text" placeholder="วางข้อมูลจาก Dime หรือ JSON..."></textarea>
        <div style="margin-top:15px; display:flex; gap:10px">
            <button class="btn btn-ac" onclick="processImport()">PROCESS</button>
            <button class="btn btn-dim" onclick="closeModals()">CLOSE</button>
        </div>
    </div>
</div>

<script>
    // System Database
    let db = JSON.parse(localStorage.getItem('endrossi_db_pro')) || {
        assets: [],
        dividends: [],
        ideal: { T1: 40, T2: 30, T3: 20, CM: 10 }
    };

    const WATCH_MAP = {
        "NVDA": "AMD competition / Custom ASIC risk",
        "AAPL": "China demand / Services growth",
        "BTC": "Halving cycle / ETF Inflows"
    };

    // Initialize UI Elements
    document.getElementById('btn-import').onclick = () => document.getElementById('modal-import').style.display='flex';
    document.getElementById('btn-refresh').onclick = fetchSignals;

    window.onload = render;

    function processImport() {
        const input = document.getElementById('import-text').value.trim();
        if(!input) return;

        try {
            if (input.startsWith('{')) {
                db = JSON.parse(input);
            } else {
                const lines = input.split('\n');
                let newAssets = [];
                lines.forEach(l => {
                    const p = l.trim().split(/\s+/);
                    if(p.length >= 3) {
                        const sym = p[0].toUpperCase();
                        const qty = parseFloat(p[1].replace(/,/g,''));
                        const price = parseFloat(p[2].replace(/,/g,''));
                        if(!isNaN(qty)) newAssets.push([sym, qty, price, "T1", 50]); 
                    }
                });
                if(newAssets.length > 0) db.assets = newAssets;
            }
            saveAndRender();
            closeModals();
        } catch(e) { alert("ข้อมูลไม่ถูกต้อง"); }
    }

    function fetchSignals() {
        document.getElementById('api-status').innerText = "FETCHING...";
        setTimeout(() => {
            db.assets = db.assets.map(a => {
                const newRsi = Math.floor(Math.random() * 60 + 20);
                return [a[0], a[1], a[2], a[3], newRsi];
            });
            saveAndRender();
            document.getElementById('api-status').innerText = "LIVE UPDATED";
        }, 800);
    }

    function render() {
        const tableBody = document.querySelector('#asset-table tbody');
        const alertBox = document.getElementById('alerts-container');
        tableBody.innerHTML = '';
        alertBox.innerHTML = '';
        let totalValue = 0;

        db.assets.forEach((a, i) => {
            const val = a[1] * a[2];
            totalValue += val;

            if(WATCH_MAP[a[0]]) {
                alertBox.innerHTML += `<div class="alert-box"><b>${a[0]}:</b> ${WATCH_MAP[a[0]]}</div>`;
            }

            tableBody.innerHTML += `
                <tr>
                    <td style="font-weight:bold">${a[0]}</td>
                    <td>$${val.toLocaleString()}</td>
                    <td>$${a[2].toLocaleString()}</td>
                    <td style="color:${a[4] > 70 ? 'var(--trim)' : (a[4] < 30 ? 'var(--buy)' : 'var(--mt)')}">${a[4] || '-'}</td>
                    <td>
                        <select onchange="updateTier(${i}, this.value)">
                            <option ${a[3]=='T1'?'selected':''}>T1</option>
                            <option ${a[3]=='T2'?'selected':''}>T2</option>
                            <option ${a[3]=='T3'?'selected':''}>T3</option>
                            <option ${a[3]=='CM'?'selected':''}>CM</option>
                        </select>
                    </td>
                </tr>
            `;
        });

        document.getElementById('total-val').innerText = `$${totalValue.toLocaleString()}`;
    }

    function updateTier(idx, val) { db.assets[idx][3] = val; saveAndRender(); }
    function saveAndRender() { localStorage.setItem('endrossi_db_pro', JSON.stringify(db)); render(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
</script>
</body>
</html>
