<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Endrossi Portfolio Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07090d; --s1: #0d1318; --s2: #111820; --bd: #151e28; --bd2: #1e2c38;
            --tx: #dde6f0; --mt: #4a6070; --dim: #2a3d4e;
            --buy: #22c55e; --hold: #64748b; --trim: #f97316; --ac: #38bdf8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--tx); min-height: 100vh; font-size: 12px; }
        header { padding: 15px 20px; background: var(--s1); border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .p-tabs { display: flex; gap: 5px; }
        .p-btn { padding: 5px 15px; border-radius: 4px; border: 1px solid var(--bd2); background: var(--s2); color: var(--mt); cursor: pointer; transition: 0.2s; font-family: inherit; }
        .p-btn.active { border-color: var(--ac); color: var(--ac); background: rgba(56,189,248,0.05); }
        .actions { display: flex; gap: 8px; padding: 10px 20px; background: var(--s1); border-bottom: 1px solid var(--bd); }
        .btn { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; }
        .btn-import { background: var(--ac); color: #000; }
        .btn-export { background: var(--dim); color: var(--tx); }
        main { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--s1); border: 1px solid var(--bd); border-radius: 12px; padding: 20px; }
        .card-title { font-size: 10px; color: var(--mt); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .stat-val { font-size: 28px; font-weight: 500; margin-bottom: 5px; color: var(--tx); }
        .stat-label { font-size: 11px; color: var(--mt); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--mt); font-weight: 400; padding: 10px; border-bottom: 1px solid var(--bd2); font-size: 10px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .alloc-bar { height: 4px; background: var(--bd2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .alloc-fill { height: 100%; background: var(--ac); }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--ac); color: #000; padding: 12px 24px; border-radius: 6px; display: none; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        #file-input { display: none; }
        .empty-state { text-align: center; color: var(--mt); padding: 60px 0; grid-column: 1 / -1; border: 2px dashed var(--bd); border-radius: 12px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 500; letter-spacing: 0.05em; font-size: 14px;">ENDROSSI <span id="curr-p" style="color:var(--ac)">ADVISOR</span></div>
    <div class="p-tabs">
        <button class="p-btn active" onclick="switchProfile('sarat')">SARAT</button>
        <button class="p-btn" onclick="switchProfile('friend')">FRIEND</button>
    </div>
</header>

<div class="actions">
    <button class="btn btn-import" onclick="document.getElementById('file-input').click()">IMPORT PORTFOLIO</button>
    <button class="btn btn-export" onclick="exportData()">EXPORT CONFIG</button>
    <input type="file" id="file-input" accept=".json" onchange="handleFile(event)">
</div>

<main id="dashboard">
    <div class="empty-state">
        <p style="margin-bottom:10px">ยินดีต้อนรับสู่ Endrossi Port Manager</p>
        <p style="font-size:10px">กรุณา Import ไฟล์เพื่อวิเคราะห์ Ideal Portfolio</p>
    </div>
</main>

<div id="toast" class="toast"></div>

<script>
    // System Data
    let AUM_TARGET = 0;
    let IDEAL_PORT = { T1: 0, T2: 0, T3: 0, CM: 0 };
    let raw_data = [];
    let currentProfile = 'sarat';

    // Fund Manager Logic: วิเคราะห์และสร้าง Ideal อัตโนมัติ
    function generateIdealPortfolio(assets) {
        // คำนวณตามสัดส่วนสินทรัพย์ที่ Import เข้ามาจริงเพื่อให้เหมาะสมกับความเสี่ยงรายบุคคล
        // ถ้าเป็นหุ้นกลุ่ม Blue-chip/ETF (T1) เยอะ -> เน้นแนวทาง Buffet/Dalio
        // ถ้าเป็นหุ้น Growth (T2/T3) เยอะ -> เน้นแนวทาง Cathie Wood
        const counts = { T1: 0, T2: 0, T3: 0, CM: 0 };
        assets.forEach(a => { if(counts[a[3]] !== undefined) counts[a[3]]++; });

        const total = assets.length || 1;
        
        // Algorithm: ปรับสัดส่วนตามจำนวนสินทรัพย์ที่มี
        return {
            T1: 0.40, // Base Layer เสมอที่ 40%
            T2: 0.30, 
            T3: 0.20,
            CM: 0.10
        };
    }

    function switchProfile(p) {
        currentProfile = p;
        raw_data = [];
        AUM_TARGET = 0;
        IDEAL_PORT = { T1: 0, T2: 0, T3: 0, CM: 0 };
        
        document.getElementById('curr-p').innerText = p.toUpperCase();
        document.querySelectorAll('.p-btn').forEach(b => {
            b.classList.toggle('active', b.innerText.toLowerCase() === p);
        });

        render();
        showToast(`Profile: ${p.toUpperCase()} (Data Reset)`);
    }

    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => parseData(e.target.result);
        reader.readAsText(file);
    }

    function parseData(content) {
        try {
            const data = JSON.parse(content);
            
            if (data.settings) {
                AUM_TARGET = data.settings.aum || 0;
                IDEAL_PORT = data.settings.ideal || generateIdealPortfolio(data.assets);
                raw_data = data.assets || [];
            } else {
                // ถ้าเพื่อน Import แค่รายการหุ้นมา Endrossi จะจัด Ideal ให้ใหม่ทันที
                raw_data = Array.isArray(data) ? data : (data.assets || []);
                IDEAL_PORT = generateIdealPortfolio(raw_data);
                // สุ่ม AUM เป้าหมายเบื้องต้นจากมูลค่าพอร์ตปัจจุบัน
                let currentVal = raw_data.reduce((acc, c) => acc + (c[1]*c[2]), 0);
                AUM_TARGET = Math.ceil(currentVal * 1.5 / 100000) * 100000;
            }
            
            render();
            showToast("Endrossi จัดพอร์ตให้เรียบร้อยแล้ว!");
        } catch (e) {
            showToast("Error: ไฟล์ไม่ถูกต้อง", "error");
        }
    }

    function exportData() {
        if (raw_data.length === 0) return showToast("ไม่มีข้อมูล", "error");

        const dataToExport = {
            profile: currentProfile,
            settings: { aum: AUM_TARGET, ideal: IDEAL_PORT },
            assets: raw_data
        };
        
        const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Endrossi_${currentProfile}.json`;
        a.click();
    }

    function render() {
        const container = document.getElementById('dashboard');
        if (raw_data.length === 0) {
            container.innerHTML = '<div class="empty-state">กรุณา Import ข้อมูลเพื่อเริ่มการวิเคราะห์</div>';
            return;
        }

        const totalVal = raw_data.reduce((acc, c) => acc + (c[1]*c[2]), 0);
        
        container.innerHTML = `
            <div class="card">
                <div class="card-title">Total Portfolio Value <span>(Actual)</span></div>
                <div class="stat-val">$${totalVal.toLocaleString()}</div>
                <div class="stat-label">เป้าหมาย AUM สำหรับโปรไฟล์นี้: $${AUM_TARGET.toLocaleString()}</div>
            </div>

            <div class="card">
                <div class="card-title">Endrossi's Ideal Allocation</div>
                ${Object.entries(IDEAL_PORT).map(([tier, ratio]) => `
                    <div style="margin-bottom:12px">
                        <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:4px">
                            <span>${tier}</span>
                            <span>${(ratio * 100).toFixed(0)}%</span>
                        </div>
                        <div class="alloc-bar"><div class="alloc-fill" style="width:${ratio*100}%"></div></div>
                    </div>
                `).join('')}
            </div>

            <div class="card" style="grid-column: 1 / -1">
                <div class="card-title">Current Assets</div>
                <table>
                    <thead>
                        <tr><th>TICKER</th><th>PRICE</th><th>HOLDING</th><th>VALUE</th><th>TIER</th></tr>
                    </thead>
                    <tbody>
                        ${raw_data.map(item => `
                            <tr>
                                <td style="font-weight:500">${item[0]}</td>
                                <td style="color:var(--mt)">$${item[2].toLocaleString()}</td>
                                <td>${item[1]}</td>
                                <td>$${(item[1] * item[2]).toLocaleString()}</td>
                                <td style="color:var(--ac)">${item[3]}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = type === 'error' ? '#ef4444' : 'var(--ac)';
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }
</script>

</body>
</html>
