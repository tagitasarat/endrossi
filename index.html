<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endrossi - Anthropic Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        .prose pre { background-color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        .prose code { background-color: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; }
        .message-user { background-color: #dbeafe; align-self: flex-end; }
        .message-assistant { background-color: #f3f4f6; align-self: flex-start; }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <header class="bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">Endrossi Chat</h1>
        <div class="flex items-center space-x-4">
            <select id="model-select" class="bg-gray-50 border border-gray-300 text-sm rounded-lg p-2">
                <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku</option>
                <option value="claude-3-opus-20240229">Claude 3 Opus</option>
            </select>
            <button id="clear-btn" class="text-sm text-red-600 hover:text-red-800">Clear Chat</button>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 flex flex-col max-w-4xl mx-auto w-full">
        <div class="message-assistant p-4 rounded-2xl max-w-[85%] prose">
            สวัสดีครับ! ผมคือ Claude มีอะไรให้ช่วยไหมครับ?
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-200">
        <div class="max-w-4xl mx-auto flex space-x-4">
            <textarea id="user-input" 
                class="flex-1 border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                placeholder="พิมพ์ข้อความที่นี่..." 
                rows="1"></textarea>
            <button id="send-btn" 
                class="bg-blue-600 text-white px-6 py-2 rounded-xl font-medium hover:bg-blue-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                ส่ง
            </button>
        </div>
    </footer>

    <script>
        // CONFIGURATION - แก้ไขที่นี่เรียบร้อยแล้วครับ
        const PROXY_URL = 'https://worker.tasarattagi.workers.dev'; 

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const modelSelect = document.getElementById('model-select');

        let chatHistory = [];

        // Auto-resize textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
        });

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-[85%] prose ${role === 'user' ? 'message-user' : 'message-assistant'}`;
            
            // ใช้ marked เพื่อแปลง Markdown เป็น HTML
            div.innerHTML = marked.parse(content);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Update UI
            userInput.value = '';
            userInput.style.height = 'auto';
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage('user', message);
            chatHistory.push({ role: 'user', content: message });

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        max_tokens: 4096,
                        messages: chatHistory
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || 'Unknown error occurred');
                }

                const assistantMessage = data.content[0].text;
                appendMessage('assistant', assistantMessage);
                chatHistory.push({ role: 'assistant', content: assistantMessage });

            } catch (error) {
                console.error('Error:', error);
                appendMessage('assistant', `❌ Error: ${error.message}`);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('คุณต้องการล้างบทสนทนาทั้งหมดใช่หรือไม่?')) {
                chatContainer.innerHTML = `
                    <div class="message-assistant p-4 rounded-2xl max-w-[85%] prose">
                        ล้างข้อมูลเรียบร้อยแล้วครับ มีอะไรให้ช่วยอีกไหม?
                    </div>
                `;
                chatHistory = [];
            }
        });
    </script>
</body>
</html>
